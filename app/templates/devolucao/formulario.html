{% extends 'base.html' %}

{% block titulo %}Solicitar Devolução{% endblock %}

{% block conteudo %}
<h2 style="text-align: center;">Solicitar Devolução</h2>

<div style="max-width: 500px; margin: 0 auto; margin-top: 30px;">

    <div style="text-align: center; margin-bottom: 20px;">
        <p><strong>Pedido Nº:</strong> {{ pedido.numero }}</p>
    </div>

    <form method="POST">

        <div class="form-group" style="margin-bottom: 20px;">
            <label><strong>Motivo da devolução:</strong></label>
            <select name="motivo"
                    style="width: 100%; padding: 8px; margin-top: 5px;" required>
                <option value="" disabled selected>Selecione um motivo</option>
                {% for motivo in motivos %}
                    <option value="{{ motivo }}">{{ motivo }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="text-align: center;">
            <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 10px;">
                Confirmar devolução
            </button>
        </div>

    </form>

    <div style="text-align: center; margin-top: 15px;">
        <a href="/meus-pedidos" class="btn btn-secondary">
            Voltar aos meus pedidos
        </a>
    </div>

</div>

{% endblock %}
