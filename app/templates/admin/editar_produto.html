{% extends 'base.html' %}

{% block titulo %}Editar Produto{% endblock %}

{% block conteudo %}
<h2 style="text-align: center;">Editar Produto</h2>

<div style="max-width: 500px; margin: 0 auto; margin-top: 30px;">

    <form method="post" enctype="multipart/form-data">

        <div class="form-group" style="margin-bottom: 15px;">
            <label><strong>Nome:</strong></label>
            <input type="text" name="nome" value="{{ produto.nome }}"
                   style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label><strong>Código:</strong></label>
            <input type="text" name="codigo" value="{{ produto.codigo }}"
                   style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label><strong>Categoria:</strong></label>
            <input type="text" name="categoria" value="{{ produto.categoria }}"
                   style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label><strong>Preço:</strong></label>
            <input type="number" step="0.01" name="preco" value="{{ produto.preco }}"
                   style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label><strong>Quantidade:</strong></label>
            <input type="number" name="quantidade" value="{{ produto.quantidade }}"
                   style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label><strong>Imagem do produto:</strong></label>
            <input type="file" name="imagem" accept="image/*"
                   style="margin-top: 5px;">
        </div>

        <div style="text-align: center;">
            <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 10px;">
                Salvar alterações
            </button>
        </div>

    </form>

    <div style="text-align: center; margin-top: 15px;">
        <a href="/admin" class="btn btn-secondary" style="margin-right: 10px;">
            Voltar ao painel
        </a>
        <a href="/logout" class="btn btn-secondary">
            Sair
        </a>
    </div>

</div>

{% endblock %}
