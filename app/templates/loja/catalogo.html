<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Peças</title>
</head>
<body>
{% for produto in produtos %}
    <p>{{ produto.nome }}</p>
    <p>Preço: R$ {{ produto.preco | moeda }}</p>

    {% if produto.quantidade > 0 %}
        <p>Em estoque ({{ produto.quantidade }} unidades)</p>
    {% else %}
        <p>Indisponível</p>
    {% endif %}

    <a href="/produto/{{ produto.id }}">Ver detalhes</a>
    <hr>
    {% endfor %}
    <a href="/logout">Sair</a>
</body>
</html>
