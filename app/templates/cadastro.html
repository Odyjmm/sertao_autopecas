{% extends 'base.html' %}

{% block titulo %}Cadastro{% endblock %}

{% block conteudo %}
<h2 style="text-align: center;">Cadastro</h2>

<div style="max-width: 500px; margin: 0 auto; margin-top: 30px;">

    {% if erro %}
    <div style="color: red; margin-bottom: 15px; text-align: center;">
        {{ erro }}
    </div>
    {% endif %}

    <form action="/cadastro" method="POST" onsubmit="return validarSenha()">

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="nome"><strong>Nome:</strong></label>
            <input type="text" id="nome" name="nome"
                   style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="usuario"><strong>Email:</strong></label>
            <input type="email" id="usuario" name="email"
                   style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="senha"><strong>Senha:</strong></label>
            <input type="password" id="senha" name="senha"
                   style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="confirmar_senha"><strong>Confirmar Senha:</strong></label>
            <input type="password" id="confirmar_senha" name="confirmar_senha"
                   style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="endereco"><strong>Endereço:</strong></label>
            <input type="text" id="endereco" name="endereco"
                   style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="cidade"><strong>Cidade:</strong></label>
            <input type="text" id="cidade" name="cidade"
                   style="width: 100%; padding: 8px; margin-top: 5px;" required>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="estado"><strong>Estado:</strong></label>
            <select id="estado" name="estado"
                    style="width: 100%; padding: 8px; margin-top: 5px;" required>
                <option value="">Selecione...</option>
                <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
                <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
                <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
                <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
                <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
                <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
                <option>SP</option><option>SE</option><option>TO</option>
            </select>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label for="cep"><strong>CEP:</strong></label>
            <input type="text" id="cep" name="cep" maxlength="9"
                   style="width: 100%; padding: 8px; margin-top: 5px;"
                   placeholder="00000-000" required>
        </div>

        <div class="form-group" style="margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <input type="checkbox" id="termos" name="termos" required style="margin: 0; width: auto;">
            <label for="termos" style="margin: 0; line-height: 1;">
                Li e aceito os
                <a href="/termos" target="_blank">Termos de Uso e Política de Privacidade</a>
            </label>
        </div>

        <div style="text-align: center;">
            <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 10px;">
                Cadastrar
            </button>
        </div>

    </form>

    <div style="text-align: center; margin-top: 15px;">
        <a href="/login" class="btn btn-secondary">
            Já tenho conta
        </a>
    </div>

</div>

<script src="{{ url_for('static', filename='js/senha.js') }}"></script>

{% endblock %}
